server:
  address: ${VIBE_SERVER_ADDRESS:127.0.0.1}
  port: ${VIBE_SERVER_PORT:8080}

# 生产敏感值只能由 S6 受控安装流程写入外部配置，本文件不保存密钥。
spring:
  datasource:
    url: ${VIBE_DB_URL:}
    username: ${VIBE_DB_USERNAME:}
    password: ${VIBE_DB_PASSWORD:}
  data:
    redis:
      host: ${VIBE_REDIS_HOST:}
      port: ${VIBE_REDIS_PORT:6379}
      password: ${VIBE_REDIS_PASSWORD:}

logging:
  level:
    root: INFO
    com.vibeboot: INFO
